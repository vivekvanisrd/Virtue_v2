version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: virtue-app-prod
    restart: always
    ports:
      - "127.0.0.1:3000:3000"  # Expose only to localhost, Nginx handles public access
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: virtue-redis-prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost for security

volumes:
  redis_data:
