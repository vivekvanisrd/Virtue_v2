# Logrotate configuration template for Virtue ERP V2
# Place in /etc/logrotate.d/virtue

/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    copytruncate
    compress
    missingok
    notifempty
    maxsize 100M
}

/var/log/nginx/virtue*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 `cat /var/run/nginx.pid`
    endscript
}
